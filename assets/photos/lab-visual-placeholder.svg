<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Computational materials research visual</title>
  <desc id="desc">Abstract crystal lattice and simulation grid illustration for the lab website.</desc>
  <defs>
